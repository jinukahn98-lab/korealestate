name: Deploy to HuggingFace Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure HuggingFace remote
        run: |
          git config --global credential.helper store
          echo "https://user:${{ secrets.HF_TOKEN }}@huggingface.co" > ~/.git-credentials

      - name: Push to HuggingFace Space
        run: |
          git remote add hf https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ secrets.HF_SPACE }}
          git push hf main --force
